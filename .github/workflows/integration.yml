name: integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # mondays at 06:00 UTC

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for recent commit (scheduled runs only)
        id: check_commit
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            LAST_COMMIT=$(git log -1 --format="%ct")
            NOW=$(date +%s)
            AGE=$((NOW - LAST_COMMIT))
            # 7 days in seconds to match weekly schedule
            THRESHOLD=$((7 * 24 * 60 * 60))
            if [ "$AGE" -gt "$THRESHOLD" ]; then
              echo "No commit in the last 7 days, skipping tests."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.check_commit.outputs.skip != 'true'
        with:
          python-version: "3.13"

      - name: Install dependencies
        if: steps.check_commit.outputs.skip != 'true'
        run: pip install -e ".[dev]"

      - name: Run integration tests
        if: steps.check_commit.outputs.skip != 'true'
        env:
          OSU_IRC_USERNAME: ${{ secrets.OSU_IRC_USERNAME }}
          OSU_IRC_PASSWORD: ${{ secrets.OSU_IRC_PASSWORD }}
        run: pytest tests/ -m integration -v
